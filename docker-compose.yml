version: '3.9'

# NOTE: Kafka runs on Redpanda Cloud (SASL/SCRAM-SHA-256). No local Kafka needed.

services:
  postgres:
    image: postgres:15-alpine
    container_name: flowdesk_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flowdesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flowdesk_secret}
      POSTGRES_DB: ${POSTGRES_DB:-flowdesk}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flowdesk} -d ${POSTGRES_DB:-flowdesk}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - flowdesk_net

  redis:
    image: redis:7-alpine
    container_name: flowdesk_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - flowdesk_net

volumes:
  postgres_data:
    name: flowdesk_postgres_data
  redis_data:
    name: flowdesk_redis_data

networks:
  flowdesk_net:
    name: flowdesk_network
    driver: bridge
